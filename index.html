<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-image: url('https://unblast.com/wp-content/uploads/2021/01/Space-Background-Images.jpg');
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .box {
        width: 500px;
        background: rgb(255, 255, 255);
        padding: 50px;
        border-radius: 15px;
        text-align: center;
        font-family: 'Lucida Sans Unicode', Verdana, sans-serif;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
    }
</style>
</head>
<body>

<div class="box">
    <h1 class="fw-bold fs-4">LOG IN AUTHENTICATION FORM</h1>
    <p>Please fill out the following blanks to log in.</p>
    
   
        
        <label>Email Address:</label>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email here">
        
        <label>Password:</label>
        <input type="password" id="password" class="form-control mb-3" placeholder="Password here">

        <div class="form-check d-flex justify-content-center mb-3">
            <input class="form-check-input me-2" type="checkbox" id="checkoutboxID" onclick="checkcheckoutboxID()">
            <label class="form-check-label" for="checkoutboxID">Remember me</label>
        </div> 

        <div class="button-group">
            <button type="submit" class="btn btn-dark">Log In</button>
            
            <button type="reset" class="btn btn-outline-danger">Clear All</button>
        </div>

    </form>
</div>

<script>
    function checkLogIn() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        
        if (email === "hello@gmail.com" && password === "no") {
            alert("Log in successful! Welcome back, hello!");
        } else if (email === "" || password === "") {
            alert("Please fill in all fields.");
        } else {
            alert("Log in failed. Incorrect email or password.");
        }
    }

    function checkcheckoutboxID() {
        let checkbox = document.getElementById("checkoutboxID").checked;
        
        if (checkbox) {
            alert("By selecting the checkbox, you agree to save your details.");
        }
    }
</script>
</body>
</html>
